{% extends 'base.html' %}

{% block content %}
<div class="card p-5">
    <h1 class="text-center mb-4">:) ZiaTalks</h1>
    <p class="text-center text-muted mb-4">Chat with any YouTube video! Paste the link below.</p>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="youtube_url" class="form-label">YouTube Video URL</label>
            <input type="url" class="form-control" id="youtube_url" name="youtube_url"
                placeholder="https://www.youtube.com/watch?v=..." required>
        </div>
        <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Start Chatting</button>
        </div>
    </form>
</div>
{% endblock %}
